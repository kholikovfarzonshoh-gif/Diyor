name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            build-essential

      - name: Install buildozer and cython
        run: pip install buildozer cython==0.29.36

      - name: Build APK with buildozer
        run: |
          cd mobile_app
          yes | buildozer -v android debug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mega-app-apk
          path: mobile_app/bin/*.apk
